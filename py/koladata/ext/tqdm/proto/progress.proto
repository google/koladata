edition = "2023";

package koladata.ext.tqdm;

// Rich progress state for tqdm-like progress bars.
message ProgressRecord {
  // Number of items completed.
  double n = 1;
  // Total number of items, 0 if indeterminate.
  double total = 2;
  // Seconds elapsed since the progress bar started.
  double elapsed_secs = 3;
  // Processing rate in items/s (EMA-smoothed), 0 if unavailable.
  double rate = 4;
  // Starting counter value (usually 0).
  double initial = 5;
  // Unit label (e.g. "it", "batch", "step").
  string unit = 6;
  // Description prefix set by the user.
  string desc = 7;
  // Postfix string set by the user.
  string postfix = 8;
  // Unique identifier for the progress bar.
  string bar_id = 9;
  // True if the progress bar has been closed.
  bool is_closed = 10;
  // True if the progress bar should be displayed (usually False if closed and
  // leave=False).
  bool is_displayed = 11;
}
