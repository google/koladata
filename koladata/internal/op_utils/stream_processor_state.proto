// Protos used internally for stream-processing operator state strings.

edition = "2023";

package koladata.internal;

option java_outer_classname = "StreamProcessorState";
option java_multiple_files = true;

// Internal to JsonSalvageStreamProcessor. Do not use directly.
message JsonSalvageStateProto {
  // Must match options passed to processor.
  bool allow_nan = 1;
  bool ensure_ascii = 2;
  int64 max_depth = 3;

  bytes utf8_buffer = 4;
  repeated int32 container_stack = 5;
  bool needs_leading_separator = 6;
  bool is_object_key = 7;
  repeated int32 buffer = 8;
  int32 state = 9;
  int32 json_string_utf16_first_surrogate = 10;
}

// Internal to JsonPrettifyStreamProcessor. Do not use directly.
message JsonPrettifyStateProto {
  // Must match options passed to processor.
  string indent_string = 1;

  int64 container_depth = 2;
  bool has_contents = 3;
  bool is_in_string = 4;
  bool is_in_escape = 5;
  bool needs_newline_and_indent = 6;
}

// Internal to JsonCompactifyStreamProcessor. Do not use directly.
message JsonCompactifyStateProto {
  int64 container_depth = 1;
  bool is_in_value = 2;
  bool is_in_string = 3;
  bool is_in_escape = 4;
}

// Internal to JsonUnquoteStreamProcessor. Do not use directly.
message JsonUnquoteStateProto {
  bool is_in_string = 1;
  bytes escape_buffer = 2;
}

// Internal to JsonQuoteStreamProcessor. Do not use directly.
message JsonQuoteStateProto {
  bool emitted_opening_quote = 1;
}
